- name: Create appuser
  ansible.builtin.user:
    name: appuser
    system: yes
    shell: /bin/false


- name: Create /app directory
  ansible.builtin.file:
    path: /app
    state: directory


- name: Download and extract application
  ansible.builtin.unarchive:
    src: https://raw.githubusercontent.com/raghudevopsb88/wealth-project/main/artifacts/{{COMPONENT}}.tar.gz
    dest: /app
    remote_src: yes